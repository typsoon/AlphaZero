name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  LIBTORCH_VERSION: "2.7.1"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest requests doit cmakelang

    - name: Cache LibTorch
      id: cache-libtorch
      uses: actions/cache@v5
      with:
        path: libtorch
        key: libtorch-${{ env.LIBTORCH_VERSION }}-cxx11-abi

    - name: Download and Extract LibTorch
      if: steps.cache-libtorch.outputs.cache-hit != 'true'
      run: |
        wget -q https://download.pytorch.org/libtorch/cpu/libtorch-cxx11-abi-shared-with-deps-${{ env.LIBTORCH_VERSION }}%2Bcpu.zip -O libtorch.zip
        unzip -q libtorch.zip
        rm libtorch.zip
        
    - name: Set LibTorch Path
      run: echo "LIBTORCH_PATH=$PWD/libtorch" >> $GITHUB_ENV

    - name: Cache vcpkg
      id: cache-vcpkg
      uses: actions/cache@v5
      with:
        path: |
          vcpkg
          ~/.cache/vcpkg
        key: vcpkg-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

    - name: Setup vcpkg and install C++ dependencies
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/Microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
        ./vcpkg/vcpkg install spdlog nlohmann-json json-schema-validator asio crow cpputest

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_PREFIX_PATH=${{ env.LIBTORCH_PATH }} -DBUILD_TESTS=ON -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake

    - name: Build C++ components
      run: |
        cd build
        make -j$(nproc)

    - name: Format Checks (C++ & Python)
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format fd-find
        doit check_cpp_format
        doit check_cmake_format
        doit check_cmake_lint
        doit check_python_format

    - name: Python Lint Check
      run: |
        doit check_python_lint

    - name: C++ Tests
      run: |
        doit test_cpp

    - name: Python Tests
      run: |
        doit test_python
